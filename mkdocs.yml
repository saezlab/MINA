site_name: MINA
site_description: Multicellular INtegration Analysis
site_url: https://saezlab.github.io/mina/
repo_url: https://github.com/saezlab/MINA
repo_name: saezlab/MINA
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_root_heading: true
            show_root_toc_entry: false
            show_source: false
            show_signature_annotations: true
            members_order: source
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore_h1_titles: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - _static/css/custom.css

nav:
  - Home: index.md
  - Tutorials:
      - Available aplications : tutorials.md
      - Multicellular Factor Analysis with MOFA: notebooks/GetStarted_MOFA.ipynb
      - Multicellular Programs Guided by Patient Covariates: notebooks/GetStarted_SOFA.ipynb
      - Multicellular Programs Across Experimental Groups: notebooks/GetStarted_groups.ipynb
      - Multicellular Factor Analysis with Functional Views: notebooks/GetStarted_FunctionalViews.ipynb
      - Multicellular Factor Analysis guided by pathway annotations: notebooks/GetStarted_FunctionalViews_guided.ipynb
  - API:
      - Overview: api/index.md
      - Upstream: api/up.md
      - Downstream: api/down.md
      - Plotting: api/pl.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - References: references.md
